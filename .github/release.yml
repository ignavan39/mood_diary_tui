name: Release (Linux)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compiler (linux/arm64)
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          VERSION="${{ github.ref_name }}"
          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -trimpath \
            -o "mood-diary" \
            ./cmd/mood-diary

      - name: Package (tar.gz)
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          NAME="mood-diary_${VERSION}_linux_${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          cp mood-diary "dist/${NAME}/"
          cp -r locales "dist/${NAME}/"
          cp README.md LICENSE "dist/${NAME}/" 2>/dev/null || true
          cd dist
          tar -czf "${NAME}.tar.gz" "${NAME}"
          rm -rf "${NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood-diary-linux-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true