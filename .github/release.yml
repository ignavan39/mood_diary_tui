name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64

          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compiler (linux/arm64)
        if: matrix.apt != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${{ github.ref_name }}"
          BINARY="mood-diary"
          [[ "${{ matrix.goos }}" == "windows" ]] && BINARY="mood-diary.exe"

          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -trimpath \
            -o "${BINARY}" \
            ./cmd/mood-diary

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          NAME="mood-diary_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          cp mood-diary "dist/${NAME}/"
          cp -r locales "dist/${NAME}/"
          cp README.md LICENSE "dist/${NAME}/" 2>/dev/null || true
          cd dist
          tar -czf "${NAME}.tar.gz" "${NAME}"
          rm -rf "${NAME}"

      - name: Package (zip)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          NAME="mood-diary_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          cp mood-diary.exe "dist/${NAME}/"
          cp -r locales "dist/${NAME}/"
          cp README.md LICENSE "dist/${NAME}/" 2>/dev/null || true
          cd dist
          7z a "${NAME}.zip" "${NAME}"
          rm -rf "${NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood-diary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true