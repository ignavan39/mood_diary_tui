name: CI

on:
  push:
    branches: [master, main, feat/ci]
  pull_request:
    branches: [master, main, feat/ci]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags "-s -w" -trimpath ./cmd/mood-diary